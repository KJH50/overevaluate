name: 云端构建模组

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17          # 根据项目实际 Java 版本修改，如 8、21 等

      - name: 赋予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 构建模组
        run: ./gradlew build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 模组文件
          path: build/libs/*.jar
