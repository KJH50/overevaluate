name: 云端构建模组

on:
  push:
    branches: [ main, master ]   # 当你 push 到主分支时触发
  workflow_dispatch:             # 允许手动触发（在 Actions 页面点按钮）

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Java 环境（根据项目需要的版本修改）
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      # 3. 使 Gradle Wrapper 可执行（仅 Linux/macOS 需要）
      - name: 赋予 gradlew 执行权限
        run: chmod +x ./gradlew

      # 4. 构建模组
      - name: 构建
        run: ./gradlew build

      # 5. 上传构建产物（jar 文件）
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 模组文件
          path: build/libs/*.jar
